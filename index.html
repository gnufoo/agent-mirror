<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero's Memory Graph — LIVE 3D</title>
<script src="https://cdn.jsdelivr.net/npm/d3-force-3d@3"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif; overflow: hidden; }

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  padding: 16px 24px; background: linear-gradient(180deg, #0a0a0f 60%, transparent);
  display: flex; align-items: center; justify-content: space-between;
  pointer-events: none;
}
.header h1 { font-size: 20px; letter-spacing: 2px; color: #fff; }
.header .subtitle { color: #666; font-size: 12px; }
.live-badge {
  display: inline-flex; align-items: center; gap: 6px;
  margin-left: 12px; font-size: 10px; color: #22c55e; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #22c55e;
  animation: livePulse 2s infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px #22c55e; }
  50% { opacity: 0.4; box-shadow: 0 0 1px #22c55e; }
}
.stats { display: flex; gap: 16px; font-size: 12px; color: #888; }
.stats span { color: #4488ff; font-weight: 600; }

.legend {
  position: fixed; bottom: 20px; left: 20px; z-index: 10;
  background: #111118cc; border: 1px solid #1a1a25; border-radius: 10px;
  padding: 14px 18px; backdrop-filter: blur(8px);
  max-height: calc(100vh - 100px); overflow-y: auto;
}
.legend h3 { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; cursor: pointer; }
.legend-item:hover { color: #fff; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-sep { border-top: 1px solid #1a1a25; margin: 8px 0; }

.tooltip {
  position: fixed; z-index: 20; pointer-events: none;
  background: #16161eee; border: 1px solid #2a2a35; border-radius: 8px;
  padding: 10px 14px; font-size: 12px; max-width: 300px;
  display: none; backdrop-filter: blur(8px);
}
.tooltip .tt-label { font-weight: 600; color: #fff; margin-bottom: 4px; }
.tooltip .tt-cat { color: #888; font-size: 11px; }
.tooltip .tt-type { color: #4488ff; font-size: 10px; text-transform: uppercase; }
.tooltip .tt-access { font-size: 10px; color: #aaa; margin-top: 4px; }

.controls {
  position: fixed; top: 60px; right: 320px; z-index: 10;
  display: flex; flex-direction: column; gap: 6px;
}
.controls button {
  background: #16161e; border: 1px solid #2a2a35; color: #aaa; border-radius: 6px;
  padding: 6px 12px; font-size: 11px; cursor: pointer; pointer-events: all;
}
.controls button:hover { background: #222; color: #fff; }

.activity-feed {
  position: fixed; top: 0; right: 0; bottom: 0; width: 300px; z-index: 10;
  background: #0d0d14ee; border-left: 1px solid #1a1a25;
  backdrop-filter: blur(12px); display: flex; flex-direction: column;
  font-family: 'JetBrains Mono', monospace;
}
.feed-header {
  padding: 16px; border-bottom: 1px solid #1a1a25;
  font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px;
  display: flex; align-items: center; justify-content: space-between;
}
.feed-header .event-count { color: #4488ff; font-weight: 600; }
.feed-list { flex: 1; overflow-y: auto; padding: 8px; }
.feed-list::-webkit-scrollbar { width: 4px; }
.feed-list::-webkit-scrollbar-track { background: transparent; }
.feed-list::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 2px; }
.feed-item {
  padding: 8px 10px; border-radius: 6px; margin-bottom: 4px;
  background: #11111800; border: 1px solid transparent;
  animation: feedIn 0.3s ease-out; transition: background 0.2s;
}
.feed-item:hover { background: #16161e; }
.feed-item.new { border-color: #2a2a35; background: #16161e44; }
@keyframes feedIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.feed-time { font-size: 9px; color: #444; margin-bottom: 2px; }
.feed-badge {
  display: inline-block; font-size: 9px; font-weight: 600;
  padding: 1px 6px; border-radius: 3px; text-transform: uppercase;
  letter-spacing: 0.5px; margin-right: 6px;
}
.feed-badge.read { background: #3b82f620; color: #3b82f6; }
.feed-badge.write { background: #fa583820; color: #fa5838; }
.feed-badge.search { background: #a855f720; color: #a855f7; }
.feed-badge.grep { background: #22d3ee20; color: #22d3ee; }
.feed-path { font-size: 10px; color: #aaa; word-break: break-all; }
.feed-query { font-size: 10px; color: #a855f7; font-style: italic; margin-top: 2px; }
.feed-empty { text-align: center; color: #333; font-size: 11px; padding: 40px 20px; }

#canvas-container { position: absolute; top: 0; left: 0; width: calc(100vw - 300px); height: 100vh; }
#canvas-container canvas { display: block; }

.ws-status {
  position: fixed; bottom: 20px; right: 320px; z-index: 10;
  font-size: 10px; padding: 4px 10px; border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
}
.ws-status.connected { color: #22c55e; background: #22c55e10; }
.ws-status.disconnected { color: #ef4444; background: #ef444410; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>ZERO'S MEMORY GRAPH <span class="live-badge"><span class="live-dot"></span> LIVE</span></h1>
    <div class="subtitle">Real-time 3D memory access visualization</div>
  </div>
  <div class="stats">
    <div><span id="nodeCount">0</span> nodes</div>
    <div><span id="edgeCount">0</span> edges</div>
    <div><span id="refCount">0</span> cross-refs</div>
    <div><span id="eventCount">0</span> events</div>
  </div>
</div>

<div class="controls">
  <button onclick="window._resetView()">Reset View</button>
  <button onclick="window._toggleLabels()">Toggle Labels</button>
  <button onclick="window._highlightRefs()">Show Cross-Refs</button>
  <button id="debugBtn" onclick="window._toggleDebug()" style="background:#a855f720;border-color:#a855f740;color:#a855f7;">&#10024; Debug Pulse</button>
  <button onclick="window._rescan()">Re-scan</button>
</div>

<div class="legend" id="legend"></div>
<div class="tooltip" id="tooltip"></div>

<div id="canvas-container"></div>

<div class="activity-feed">
  <div class="feed-header">
    <span>Activity Feed</span>
    <span class="event-count" id="feedCount">0 events</span>
  </div>
  <div class="feed-list" id="feedList">
    <div class="feed-empty">Waiting for memory events...</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════
// Constants
// ═══════════════════════════════════════

const ACCESS_COLORS = { read: '#3b82f6', write: '#fa5838', search: '#a855f7', grep: '#22d3ee' };
const HEAT_COLORS = ['#3b82f6','#6366f1','#a855f7','#ec4899','#f97316','#ef4444'];
const NODE_SCALE = 0.4;

// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════

let simulation;
let nodesData, edgesData, colorsData;
let nodeMap = {};
let nodeMeshes = {};
const meshToNodeId = new Map();
const raycastTargets = [];
let nodeEdgeLookup = {};
let accessCounts = {};
let totalEvents = 0;
let hoveredNodeId = null;
let debugMode = false;
let lastDebugNode = null;
let showLabels = false;
let refsHighlighted = false;
const activeAnimations = [];

let edgeMesh, edgeGeo;
let edgePositions, edgeColors, edgeBaseColors, edgeColorAttr;

const sphereGeo = new THREE.SphereGeometry(1, 20, 14);

// ═══════════════════════════════════════
// Scene Setup
// ═══════════════════════════════════════

const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0f);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.0008);

const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 1, 5000);
camera.position.set(300, 200, 450);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);
controls.minDistance = 50;
controls.maxDistance = 2000;

scene.add(new THREE.AmbientLight(0x334466, 3.5));
const dirLight1 = new THREE.DirectionalLight(0x6688cc, 0.8);
dirLight1.position.set(200, 400, 300);
scene.add(dirLight1);
const dirLight2 = new THREE.DirectionalLight(0xcc6644, 0.3);
dirLight2.position.set(-200, -100, -300);
scene.add(dirLight2);

const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2(-999, -999);

// ═══════════════════════════════════════
// Utilities
// ═══════════════════════════════════════

function createGlowTexture() {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, 'rgba(255,255,255,0.5)');
  g.addColorStop(0.2, 'rgba(255,255,255,0.2)');
  g.addColorStop(0.5, 'rgba(255,255,255,0.04)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(canvas);
}
const glowTexture = createGlowTexture();

function makeLabel(text, hexColor) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fontSize = 48;
  ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const w = Math.ceil(ctx.measureText(text).width + 24);
  const h = Math.ceil(fontSize + 20);
  canvas.width = w; canvas.height = h;
  ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillStyle = hexColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, h / 2);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  const aspect = w / h;
  sprite.scale.set(9 * aspect, 9, 1);
  return sprite;
}

function easeBackOut(t, s) {
  s = s || 3;
  return 1 + (--t) * t * ((s + 1) * t + s);
}

function easeElasticOut(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI / 3)) + 1;
}

function lerpColor(c1, c2, t) {
  return new THREE.Color(
    c1.r + (c2.r - c1.r) * t,
    c1.g + (c2.g - c1.g) * t,
    c1.b + (c2.b - c1.b) * t
  );
}

function getHeatColor(count) {
  if (count === 0) return null;
  const t = Math.min(count / 20, 1);
  const idx = Math.min(Math.floor(t * (HEAT_COLORS.length - 1)), HEAT_COLORS.length - 2);
  const frac = (t * (HEAT_COLORS.length - 1)) - idx;
  return lerpColor(new THREE.Color(HEAT_COLORS[idx]), new THREE.Color(HEAT_COLORS[idx + 1]), frac);
}

// ═══════════════════════════════════════
// Animation System
// ═══════════════════════════════════════

function addAnimation(durationMs, updateFn, onCompleteFn, tag) {
  if (tag) {
    for (let i = activeAnimations.length - 1; i >= 0; i--) {
      if (activeAnimations[i].tag === tag) {
        if (activeAnimations[i].onComplete) activeAnimations[i].onComplete();
        activeAnimations.splice(i, 1);
      }
    }
  }
  activeAnimations.push({
    startTime: performance.now(), duration: durationMs,
    update: updateFn, onComplete: onCompleteFn || null, tag: tag || null
  });
}

function tickAnimations(now) {
  for (let i = activeAnimations.length - 1; i >= 0; i--) {
    const a = activeAnimations[i];
    const t = Math.min((now - a.startTime) / a.duration, 1);
    a.update(t);
    if (t >= 1) {
      if (a.onComplete) a.onComplete();
      activeAnimations.splice(i, 1);
    }
  }
}

// ═══════════════════════════════════════
// Node ID Resolution
// ═══════════════════════════════════════

function findNodeById(targetPath) {
  if (!targetPath) return null;
  if (nodeMap[targetPath]) return targetPath;
  const tryPaths = [
    targetPath, 'mem/' + targetPath, 'core/' + targetPath,
    'mem/' + targetPath.replace(/^.*\/memory\//, ''),
    'core/' + targetPath.replace(/^.*\/clawd\//, ''),
  ];
  for (const p of tryPaths) { if (nodeMap[p]) return p; }
  const basename = targetPath.split('/').pop();
  for (const id of Object.keys(nodeMap)) {
    if (id.endsWith('/' + basename) || id.endsWith('/' + basename.replace('.md', '') + '.md')) return id;
  }
  return null;
}

// ═══════════════════════════════════════
// Build / Clear Graph
// ═══════════════════════════════════════

function clearGraph() {
  if (simulation) simulation.stop();
  if (edgeMesh) { scene.remove(edgeMesh); edgeGeo.dispose(); edgeMesh.material.dispose(); }
  for (const info of Object.values(nodeMeshes)) {
    scene.remove(info.mesh);
    info.mesh.material.dispose();
    if (info.glow) { scene.remove(info.glow); info.glow.material.dispose(); }
    if (info.label) { scene.remove(info.label); info.label.material.map.dispose(); info.label.material.dispose(); }
  }
  nodeMeshes = {}; nodeMap = {}; meshToNodeId.clear();
  raycastTargets.length = 0; nodeEdgeLookup = {};
  activeAnimations.length = 0;
  nodesData = null; edgesData = null;
  edgeMesh = null; edgeGeo = null;
}

function buildGraph(data) {
  clearGraph();
  const { nodes, edges, colors } = data;
  nodesData = nodes; edgesData = edges; colorsData = colors;

  nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  document.getElementById('nodeCount').textContent = nodes.length;
  document.getElementById('edgeCount').textContent = edges.length;
  document.getElementById('refCount').textContent = edges.filter(e => e.type === 'references').length;

  // --- Force Simulation (d3-force-3d) ---
  simulation = d3.forceSimulation(nodes)
    .numDimensions(3)
    .force('link', d3.forceLink(edges).id(d => d.id)
      .distance(d => d.type === 'structural' ? 80 : d.type === 'contains' ? 50 : 120)
      .strength(d => d.type === 'structural' ? 0.8 : d.type === 'contains' ? 0.3 : 0.15))
    .force('charge', d3.forceManyBody().strength(d =>
      d.type === 'category' ? -400 : d.type === 'core' ? -300 : -80))
    .force('center', d3.forceCenter(0, 0, 0))
    .force('collision', d3.forceCollide().radius(d => d.size * NODE_SCALE + 2))
    .force('x', d3.forceX(0).strength(0.03))
    .force('y', d3.forceY(0).strength(0.03))
    .force('z', d3.forceZ(0).strength(0.03));

  // --- Edges (LineSegments + BufferGeometry) ---
  edgePositions = new Float32Array(edges.length * 6);
  edgeColors = new Float32Array(edges.length * 6);
  edgeBaseColors = new Float32Array(edges.length * 6);

  for (let i = 0; i < edges.length; i++) {
    const e = edges[i];
    let r, g, b;
    if (e.type === 'references') { r = 0.55; g = 0.28; b = 0.1; }
    else if (e.type === 'structural') { r = 0.25; g = 0.25; b = 0.35; }
    else { r = 0.1; g = 0.12; b = 0.2; }
    const j = i * 6;
    edgeColors[j] = edgeBaseColors[j] = r;
    edgeColors[j+1] = edgeBaseColors[j+1] = g;
    edgeColors[j+2] = edgeBaseColors[j+2] = b;
    edgeColors[j+3] = edgeBaseColors[j+3] = r;
    edgeColors[j+4] = edgeBaseColors[j+4] = g;
    edgeColors[j+5] = edgeBaseColors[j+5] = b;
  }

  edgeGeo = new THREE.BufferGeometry();
  edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
  edgeColorAttr = new THREE.BufferAttribute(edgeColors, 3);
  edgeGeo.setAttribute('color', edgeColorAttr);
  const edgeMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.9 });
  edgeMesh = new THREE.LineSegments(edgeGeo, edgeMat);
  scene.add(edgeMesh);

  // --- Edge lookup: nodeId -> [{idx, base}] ---
  nodeEdgeLookup = {};
  for (let i = 0; i < edges.length; i++) {
    const e = edges[i];
    const sid = e.source.id; const tid = e.target.id;
    const base = [edgeBaseColors[i*6], edgeBaseColors[i*6+1], edgeBaseColors[i*6+2]];
    if (!nodeEdgeLookup[sid]) nodeEdgeLookup[sid] = [];
    if (!nodeEdgeLookup[tid]) nodeEdgeLookup[tid] = [];
    nodeEdgeLookup[sid].push({ idx: i, base });
    nodeEdgeLookup[tid].push({ idx: i, base });
  }

  // --- Node meshes ---
  for (const node of nodes) {
    const catColor = new THREE.Color(colors[node.category] || '#666');
    const baseColor = catColor.clone();
    if (node.type === 'file') baseColor.multiplyScalar(0.6);

    const emissiveInt = node.type === 'category' ? 0.4 : node.type === 'core' ? 0.3 : 0.15;
    const mat = new THREE.MeshStandardMaterial({
      color: baseColor, emissive: baseColor, emissiveIntensity: emissiveInt,
      metalness: 0.2, roughness: 0.7,
    });

    const mesh = new THREE.Mesh(sphereGeo, mat);
    const r = node.size * NODE_SCALE;
    mesh.scale.setScalar(r);
    mesh.userData.baseEmissiveInt = emissiveInt;
    scene.add(mesh);
    raycastTargets.push(mesh);
    meshToNodeId.set(mesh, node.id);

    const info = { mesh, glow: null, label: null, baseColor: baseColor.clone(), baseRadius: r, currentRadius: r };

    // Glow sprite for category/core nodes
    if (node.type === 'category' || node.type === 'core') {
      const glowMat = new THREE.SpriteMaterial({
        map: glowTexture, color: catColor,
        transparent: true, blending: THREE.AdditiveBlending,
        depthWrite: false, depthTest: true, opacity: 0.5,
      });
      const glow = new THREE.Sprite(glowMat);
      glow.scale.set(r * 5, r * 5, 1);
      scene.add(glow);
      info.glow = glow;

      // Label sprite
      const labelText = node.label.length > 22 ? node.label.slice(0, 20) + '\u2026' : node.label;
      const label = makeLabel(labelText, '#' + catColor.getHexString());
      scene.add(label);
      info.label = label;
    }

    nodeMeshes[node.id] = info;
  }

  // --- Legend ---
  buildLegend(colors, nodes);
}

function buildLegend(colors, nodes) {
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '<h3>Memory Categories</h3>';
  const order = ['core','identity','work','projects','meta','family','procedures','reflections','daily','nova-letters'];
  const cats = Object.entries(colors)
    .filter(([cat]) => nodes.some(n => n.category === cat))
    .sort((a, b) => {
      const ia = order.indexOf(a[0]), ib = order.indexOf(b[0]);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
  for (const [cat, color] of cats) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${cat.replace(/[-_]/g, ' ')}`;
    item.onclick = () => {
      const dimmed = item.classList.toggle('dimmed');
      for (const node of nodesData) {
        if (node.category !== cat) continue;
        const info = nodeMeshes[node.id];
        if (info) {
          info.mesh.material.opacity = dimmed ? 0.05 : 1;
          info.mesh.material.transparent = dimmed;
          info.mesh.material.needsUpdate = true;
        }
      }
    };
    legendEl.appendChild(item);
  }
  const sep = document.createElement('div'); sep.className = 'legend-sep'; legendEl.appendChild(sep);
  const ah = document.createElement('h3'); ah.textContent = 'Access Types'; ah.style.marginTop = '4px'; legendEl.appendChild(ah);
  for (const [type, color] of Object.entries(ACCESS_COLORS)) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${color};box-shadow:0 0 6px ${color}"></div>${type}`;
    legendEl.appendChild(item);
  }
}

// ═══════════════════════════════════════
// Position Updates
// ═══════════════════════════════════════

function updatePositions() {
  if (!nodesData) return;
  for (const node of nodesData) {
    const info = nodeMeshes[node.id];
    if (!info) continue;
    const x = node.x || 0, y = node.y || 0, z = node.z || 0;
    info.mesh.position.set(x, y, z);
    if (info.glow) info.glow.position.set(x, y, z);
    if (info.label) info.label.position.set(x, y - info.currentRadius - 5, z);
  }
  if (!edgesData || !edgeGeo) return;
  for (let i = 0; i < edgesData.length; i++) {
    const e = edgesData[i];
    const j = i * 6;
    edgePositions[j]   = e.source.x || 0;
    edgePositions[j+1] = e.source.y || 0;
    edgePositions[j+2] = e.source.z || 0;
    edgePositions[j+3] = e.target.x || 0;
    edgePositions[j+4] = e.target.y || 0;
    edgePositions[j+5] = e.target.z || 0;
  }
  edgeGeo.attributes.position.needsUpdate = true;
}

// ═══════════════════════════════════════
// Interaction (Raycaster, Hover, Click)
// ═══════════════════════════════════════

const tooltip = document.getElementById('tooltip');

function getConnectedIds(nodeId) {
  const set = new Set();
  for (const { idx } of (nodeEdgeLookup[nodeId] || [])) {
    const e = edgesData[idx];
    if (e.source.id === nodeId) set.add(e.target.id);
    else set.add(e.source.id);
  }
  return set;
}

function hoverNode(nodeId, event) {
  hoveredNodeId = nodeId;
  const node = nodeMap[nodeId];
  const info = nodeMeshes[nodeId];
  if (!node || !info) return;
  const count = accessCounts[nodeId] || 0;
  tooltip.style.display = 'block';
  tooltip.innerHTML = `
    <div class="tt-type">${node.type}</div>
    <div class="tt-label">${node.label}</div>
    <div class="tt-cat" style="color:${colorsData[node.category]||'#888'}">${node.category}</div>
    ${count ? `<div class="tt-access">Accessed ${count} time${count > 1 ? 's' : ''}</div>` : ''}
  `;
  tooltip.style.left = (event.clientX + 15) + 'px';
  tooltip.style.top = (event.clientY - 10) + 'px';

  const connected = getConnectedIds(nodeId);
  for (const [id, inf] of Object.entries(nodeMeshes)) {
    if (id === nodeId || connected.has(id)) {
      inf.mesh.material.color.copy(inf.baseColor);
    } else {
      inf.mesh.material.color.copy(inf.baseColor).multiplyScalar(0.08);
    }
  }
  const connEdges = new Set((nodeEdgeLookup[nodeId] || []).map(e => e.idx));
  for (let i = 0; i < edgesData.length; i++) {
    const j = i * 6;
    const mult = connEdges.has(i) ? 3.5 : 0.08;
    edgeColors[j]   = edgeBaseColors[j]   * mult;
    edgeColors[j+1] = edgeBaseColors[j+1] * mult;
    edgeColors[j+2] = edgeBaseColors[j+2] * mult;
    edgeColors[j+3] = edgeBaseColors[j+3] * mult;
    edgeColors[j+4] = edgeBaseColors[j+4] * mult;
    edgeColors[j+5] = edgeBaseColors[j+5] * mult;
  }
  edgeColorAttr.needsUpdate = true;
}

function unhover() {
  if (!hoveredNodeId) return;
  hoveredNodeId = null;
  tooltip.style.display = 'none';
  for (const info of Object.values(nodeMeshes)) {
    info.mesh.material.color.copy(info.baseColor);
  }
  edgeColors.set(edgeBaseColors);
  edgeColorAttr.needsUpdate = true;
}

container.addEventListener('mousemove', (event) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouseNDC.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouseNDC.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(raycastTargets);
  if (hits.length > 0) {
    const nid = meshToNodeId.get(hits[0].object);
    if (nid && nid !== hoveredNodeId) { unhover(); hoverNode(nid, event); }
    else if (nid) {
      tooltip.style.left = (event.clientX + 15) + 'px';
      tooltip.style.top = (event.clientY - 10) + 'px';
    }
  } else if (hoveredNodeId) {
    unhover();
  }
});

container.addEventListener('click', (event) => {
  if (!debugMode) return;
  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(raycastTargets);
  if (hits.length > 0) {
    const nid = meshToNodeId.get(hits[0].object);
    if (nid) handleDebugClick(nodeMap[nid]);
  }
});

// ═══════════════════════════════════════
// Pulse Animation
// ═══════════════════════════════════════

function pulseNode(nodeId, colorHex, durationMs) {
  const info = nodeMeshes[nodeId];
  if (!info) return;
  const mat = info.mesh.material;
  const origColor = info.baseColor.clone();
  const baseEI = info.mesh.userData.baseEmissiveInt || 0.15;
  const origEmissive = info.baseColor.clone().multiplyScalar(baseEI);
  const pulseColor = new THREE.Color(colorHex);
  const baseR = info.currentRadius || info.baseRadius;
  const glow = info.glow;
  const origGlowScale = glow ? glow.scale.x : 0;

  const light = new THREE.PointLight(new THREE.Color(colorHex), 3, baseR * 18);
  scene.add(light);

  addAnimation(durationMs, (t) => {
    let sf;
    if (t < 0.08) {
      sf = 1 + easeBackOut(t / 0.08, 3);
    } else {
      const tt = (t - 0.08) / 0.92;
      sf = 1 + (1 - easeElasticOut(tt));
    }
    info.mesh.scale.setScalar(baseR * sf);

    const ct = t < 0.08 ? 1 : Math.pow(Math.max(0, 1 - (t - 0.08) / 0.4), 2);
    mat.color.lerpColors(origColor, pulseColor, ct);
    mat.emissive.lerpColors(origEmissive, pulseColor, ct);
    mat.emissiveIntensity = baseEI + ct * 0.85;

    light.position.copy(info.mesh.position);
    light.intensity = ct * 3;

    if (glow) {
      glow.scale.setScalar(origGlowScale * (1 + ct * 0.8));
      glow.material.opacity = 0.5 + ct * 0.5;
    }
  }, () => {
    mat.color.copy(origColor);
    mat.emissive.copy(origEmissive);
    mat.emissiveIntensity = baseEI;
    info.mesh.scale.setScalar(baseR);
    scene.remove(light); light.dispose();
    if (glow) { glow.scale.setScalar(origGlowScale); glow.material.opacity = 0.5; }
  }, 'pulse-' + nodeId);

  // Pulse connected edges
  const edgeInfos = nodeEdgeLookup[nodeId];
  if (edgeInfos) {
    const pc = new THREE.Color(colorHex);
    addAnimation(durationMs, (t) => {
      const intensity = t < 0.1 ? t / 0.1 : Math.max(0, 1 - (t - 0.1) / 0.9);
      for (const { idx, base } of edgeInfos) {
        const j = idx * 6;
        const f = intensity * 0.7;
        const cr = base[0] + (pc.r - base[0]) * f;
        const cg = base[1] + (pc.g - base[1]) * f;
        const cb = base[2] + (pc.b - base[2]) * f;
        edgeColors[j] = edgeColors[j+3] = cr;
        edgeColors[j+1] = edgeColors[j+4] = cg;
        edgeColors[j+2] = edgeColors[j+5] = cb;
      }
      edgeColorAttr.needsUpdate = true;
    }, () => {
      for (const { idx, base } of edgeInfos) {
        const j = idx * 6;
        edgeColors[j] = edgeColors[j+3] = base[0];
        edgeColors[j+1] = edgeColors[j+4] = base[1];
        edgeColors[j+2] = edgeColors[j+5] = base[2];
      }
      edgeColorAttr.needsUpdate = true;
    }, 'edge-pulse-' + nodeId);
  }
}

function updateAccessCount(nodeId) {
  if (!accessCounts[nodeId]) accessCounts[nodeId] = 0;
  accessCounts[nodeId]++;
  const info = nodeMeshes[nodeId];
  if (!info) return;
  const count = accessCounts[nodeId];

  const heatColor = getHeatColor(count);
  if (heatColor) {
    info.mesh.userData.baseEmissiveInt = Math.min((info.mesh.userData.baseEmissiveInt || 0.15) + 0.03, 0.7);
    info.mesh.material.emissive.copy(heatColor);
    info.mesh.material.emissiveIntensity = info.mesh.userData.baseEmissiveInt;
    info.baseColor.lerp(heatColor, 0.15);
  }

  const growFactor = 1 + Math.min(count * 0.05, 0.4);
  info.currentRadius = info.baseRadius * growFactor;
  info.mesh.scale.setScalar(info.currentRadius);
  if (info.glow) info.glow.scale.setScalar(info.currentRadius * 5);
}

// ═══════════════════════════════════════
// Particle Trail (Debug Mode)
// ═══════════════════════════════════════

function animateParticleTrail(fromNode, toNode, colorHex, onArrive) {
  const from = new THREE.Vector3(fromNode.x||0, fromNode.y||0, fromNode.z||0);
  const to = new THREE.Vector3(toNode.x||0, toNode.y||0, toNode.z||0);
  const off = 40;
  const mid1 = from.clone().lerp(to, 0.33);
  mid1.x += (Math.random()-0.5)*off; mid1.y += (Math.random()-0.5)*off; mid1.z += (Math.random()-0.5)*off;
  const mid2 = from.clone().lerp(to, 0.66);
  mid2.x += (Math.random()-0.5)*off; mid2.y += (Math.random()-0.5)*off; mid2.z += (Math.random()-0.5)*off;
  const curve = new THREE.CatmullRomCurve3([from, mid1, mid2, to]);

  const numP = 8, stagger = 80, travelMs = 1200;

  for (let i = 0; i < numP; i++) {
    setTimeout(() => {
      const pr = 0.4 + Math.random() * 0.4;
      const geo = new THREE.SphereGeometry(pr, 6, 6);
      const mat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.9 - i * 0.05 });
      const particle = new THREE.Mesh(geo, mat);
      scene.add(particle);
      const light = new THREE.PointLight(new THREE.Color(colorHex), 0.5, 25);
      particle.add(light);

      addAnimation(travelMs, (t) => {
        particle.position.copy(curve.getPoint(t));
        particle.scale.setScalar(1 - t * 0.7);
        mat.opacity = (0.9 - i * 0.05) * (1 - t * 0.5);
        light.intensity = 0.5 * (1 - t);
      }, () => {
        scene.remove(particle); geo.dispose(); mat.dispose(); light.dispose();
      });
    }, i * stagger);
  }

  // Fading curved path line
  const pts = curve.getPoints(24);
  const pathGeo = new THREE.BufferGeometry().setFromPoints(pts);
  const pathMat = new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.3 });
  const pathLine = new THREE.Line(pathGeo, pathMat);
  scene.add(pathLine);

  const totalMs = travelMs + (numP - 1) * stagger + 800;
  addAnimation(totalMs, (t) => {
    if (t > 0.5) pathMat.opacity = 0.3 * (1 - (t - 0.5) / 0.5);
  }, () => { scene.remove(pathLine); pathGeo.dispose(); pathMat.dispose(); });

  setTimeout(onArrive, travelMs + (numP - 1) * stagger);
}

// ═══════════════════════════════════════
// Debug Mode
// ═══════════════════════════════════════

function handleDebugClick(d) {
  const colors = ['#3b82f6','#fa5838','#a855f7','#22d3ee','#22c55e'];
  const color = colors[Math.floor(Math.random() * colors.length)];

  if (lastDebugNode && lastDebugNode.id !== d.id) {
    animateParticleTrail(lastDebugNode, d, color, () => {
      pulseNode(d.id, color, 3000);
      updateAccessCount(d.id);
    });
  } else {
    pulseNode(d.id, color, 3000);
    updateAccessCount(d.id);
  }
  lastDebugNode = d;
}

// ═══════════════════════════════════════
// Activity Feed
// ═══════════════════════════════════════

const feedList = document.getElementById('feedList');
const MAX_FEED = 20;
let feedItems = [];

function addFeedItem(event) {
  totalEvents++;
  document.getElementById('eventCount').textContent = totalEvents;
  document.getElementById('feedCount').textContent = totalEvents + ' events';

  const item = document.createElement('div');
  item.className = 'feed-item new';
  const time = new Date(event.timestamp || Date.now());
  const ts = time.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const p = event.path ? event.path.replace(/^.*\/clawd\//, '') : 'unknown';
  let html = `<div class="feed-time">${ts}</div><span class="feed-badge ${event.type}">${event.type}</span><span class="feed-path">${p}</span>`;
  if (event.query) html += `<div class="feed-query">"${event.query}"</div>`;
  if (event.results && event.results.length) html += `<div class="feed-path" style="color:#666;margin-top:2px">${event.results.length} match${event.results.length > 1 ? 'es' : ''}</div>`;
  item.innerHTML = html;

  const emptyMsg = feedList.querySelector('.feed-empty');
  if (emptyMsg) emptyMsg.remove();
  feedList.prepend(item);
  feedItems.unshift(item);
  setTimeout(() => item.classList.remove('new'), 300);
  while (feedItems.length > MAX_FEED) { feedItems.pop().remove(); }
}

// ═══════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════

function connectWebSocket() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}`);
  const statusEl = document.getElementById('wsStatus');

  ws.onopen = () => { statusEl.textContent = 'CONNECTED'; statusEl.className = 'ws-status connected'; };
  ws.onclose = () => { statusEl.textContent = 'DISCONNECTED'; statusEl.className = 'ws-status disconnected'; setTimeout(connectWebSocket, 3000); };
  ws.onerror = () => { ws.close(); };

  ws.onmessage = (msg) => {
    let parsed;
    try { parsed = JSON.parse(msg.data); } catch { return; }

    if (parsed.type === 'reload') { buildGraph(parsed.data); return; }

    if (parsed.type === 'event') {
      const ev = parsed.data;
      addFeedItem(ev);

      if (ev.type === 'read') {
        const nid = findNodeById(ev.path);
        if (nid) { pulseNode(nid, ACCESS_COLORS.read, 3000); updateAccessCount(nid); }
      } else if (ev.type === 'write') {
        const nid = findNodeById(ev.path);
        if (nid) { pulseNode(nid, ACCESS_COLORS.write, 5000); updateAccessCount(nid); }
      } else if (ev.type === 'search') {
        if (ev.results && Array.isArray(ev.results)) {
          ev.results.forEach(r => {
            const nid = findNodeById(r.path);
            if (nid) {
              const intensity = Math.max(0.3, Math.min(1, r.score || 0.5));
              pulseNode(nid, ACCESS_COLORS.search, 3000 + Math.round(intensity * 2000));
              updateAccessCount(nid);
            }
          });
        }
      } else if (ev.type === 'grep') {
        if (ev.results && Array.isArray(ev.results)) {
          ev.results.forEach(r => {
            const nid = findNodeById(r.path);
            if (nid) { pulseNode(nid, ACCESS_COLORS.grep, 3000); updateAccessCount(nid); }
          });
        } else if (ev.path) {
          const nid = findNodeById(ev.path);
          if (nid) { pulseNode(nid, ACCESS_COLORS.grep, 3000); updateAccessCount(nid); }
        }
      }
    }
  };
}

// ═══════════════════════════════════════
// Global Button Bindings
// ═══════════════════════════════════════

window._resetView = function() {
  const startPos = camera.position.clone();
  const endPos = new THREE.Vector3(300, 200, 450);
  const startTarget = controls.target.clone();
  const endTarget = new THREE.Vector3(0, 0, 0);
  addAnimation(750, (t) => {
    const e = 1 - Math.pow(1 - t, 3);
    camera.position.lerpVectors(startPos, endPos, e);
    controls.target.lerpVectors(startTarget, endTarget, e);
  }, null, 'camera-reset');
};

window._toggleLabels = function() {
  showLabels = !showLabels;
  if (showLabels) {
    for (const node of (nodesData || [])) {
      const info = nodeMeshes[node.id];
      if (info && !info.label) {
        const catColor = new THREE.Color(colorsData[node.category] || '#666');
        const text = node.label.length > 20 ? node.label.slice(0, 18) + '\u2026' : node.label;
        const label = makeLabel(text, '#' + catColor.getHexString());
        label.scale.multiplyScalar(0.55);
        scene.add(label);
        info.label = label;
      }
    }
  }
  for (const [id, info] of Object.entries(nodeMeshes)) {
    if (info.label) {
      const node = nodeMap[id];
      const alwaysVisible = node && (node.type === 'category' || node.type === 'core');
      info.label.visible = showLabels || alwaysVisible;
    }
  }
};

window._highlightRefs = function() {
  refsHighlighted = !refsHighlighted;
  if (!edgesData) return;
  for (let i = 0; i < edgesData.length; i++) {
    if (edgesData[i].type !== 'references') continue;
    const j = i * 6;
    const mult = refsHighlighted ? 3.0 : 1.0;
    const baseR = refsHighlighted ? 0.55 * mult : 0.55;
    const baseG = refsHighlighted ? 0.28 * mult : 0.28;
    const baseB = refsHighlighted ? 0.1 * mult : 0.1;
    edgeColors[j] = edgeBaseColors[j] = baseR;
    edgeColors[j+1] = edgeBaseColors[j+1] = baseG;
    edgeColors[j+2] = edgeBaseColors[j+2] = baseB;
    edgeColors[j+3] = edgeBaseColors[j+3] = baseR;
    edgeColors[j+4] = edgeBaseColors[j+4] = baseG;
    edgeColors[j+5] = edgeBaseColors[j+5] = baseB;
  }
  edgeColorAttr.needsUpdate = true;
};

window._toggleDebug = function() {
  debugMode = !debugMode;
  const btn = document.getElementById('debugBtn');
  if (debugMode) {
    btn.style.background = '#a855f7'; btn.style.color = '#fff';
    btn.textContent = '\u2728 Debug ON (click nodes)';
    lastDebugNode = null;
    renderer.domElement.style.cursor = 'crosshair';
  } else {
    btn.style.background = '#a855f720'; btn.style.color = '#a855f7';
    btn.textContent = '\u2728 Debug Pulse';
    lastDebugNode = null;
    renderer.domElement.style.cursor = 'default';
  }
};

window._rescan = function() {
  fetch('/api/scan', { method: 'POST' }).then(r => r.json()).then(d => console.log('Rescan:', d)).catch(e => console.error('Rescan failed:', e));
};

// ═══════════════════════════════════════
// Animation Loop
// ═══════════════════════════════════════

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  tickAnimations(now);
  updatePositions();
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ═══════════════════════════════════════
// Resize
// ═══════════════════════════════════════

window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// ═══════════════════════════════════════
// Initialize
// ═══════════════════════════════════════

fetch('/api/graph-data')
  .then(r => r.json())
  .then(data => { buildGraph(data); connectWebSocket(); })
  .catch(e => console.error('Failed to load graph data:', e));

</script>
